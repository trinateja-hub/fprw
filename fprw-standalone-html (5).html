<title>FPRW Stocktaking Inventory Matrix</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f3f4f6;color:#1f2937;padding:20px}
.container{max-width:1200px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:24px}
h1{font-size:20px;color:#1e3a5f;margin-bottom:4px}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:20px}
.summary-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.summary-card{border-radius:8px;padding:12px 18px;min-width:80px;text-align:center;color:#fff}
.summary-card .num{font-size:24px;font-weight:700}
.summary-card .lbl{font-size:11px;opacity:.9}
.fprw-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.fprw-chip{border:2px solid;border-radius:6px;padding:6px 14px;text-align:center}
.fprw-chip .num{font-size:18px;font-weight:700}
.fprw-chip .lbl{font-size:11px;color:#4b5563}
.filters{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;font-size:13px}
.filters label{font-weight:600}
.filters select{padding:5px 10px;border-radius:5px;border:1px solid #d1d5db;font-size:13px}
.count{margin-left:auto;color:#6b7280;font-size:12px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#1e3a5f;color:#fff}
th{padding:9px 7px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0}
tbody tr{border-bottom:1px solid #e5e7eb;cursor:pointer;transition:background .15s}
tbody tr:nth-child(even){background:#f9fafb}
tbody tr:hover{background:#eef2ff}
td{padding:7px}
.badge{display:inline-block;color:#fff;padding:2px 8px;border-radius:3px;font-size:10px;margin:1px 2px;white-space:nowrap}
.cls-badge{padding:3px 10px;border-radius:4px;font-size:11px;color:#fff;font-weight:500}
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.detail-card{background:#fff;border-radius:12px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.detail-card h2{font-size:17px;line-height:1.3;margin-bottom:4px}
.detail-card .src{font-size:13px;color:#4b5563;margin-bottom:16px}
.detail-row{display:flex;border-bottom:1px solid #f0f0f0;padding:7px 0;font-size:13px;gap:10px}
.detail-row .dl{min-width:200px;font-weight:600;color:#374151;flex-shrink:0}
.detail-row .dv{color:#4b5563}
.reviewer-box{margin-top:14px;padding:12px;background:#eef2ff;border-radius:6px;font-size:13px}
.link-out{display:inline-block;margin-top:10px;font-size:12px;color:#2563eb;text-decoration:none}
.link-out:hover{text-decoration:underline}
.close-btn{position:absolute;top:14px;right:18px;background:none;border:1px solid #d1d5db;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:13px}
.close-btn:hover{background:#f3f4f6}
.top-badges{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.meth-note{margin-top:18px;padding:12px;background:#fef3c7;border-radius:8px;font-size:12px;color:#92400e}
.print-btn{background:#1e3a5f;color:#fff;border:none;border-radius:6px;padding:7px 16px;cursor:pointer;font-size:12px;margin-left:auto}
.print-btn:hover{background:#2d4a6f}
@media print{.filters,.print-btn,.close-btn{display:none!important}body{padding:0}.container{box-shadow:none}}
</style>
</head>

{id:"FPRW-026",title:"OSH in Global Value Chains: Starter Kit",type:"Toolkit",year:2018,source:"ILO VZF / SAFEWORK",link:"https://www.ilo.org/publications/occupational-safety-and-health-global-value-chains-starterkit",fprw:"OSH",lr:"Social dialogue; Workplace cooperation",gi:"Partial",osh:"Strong",aud:"Employers; EBMOs; Buyers; Supply chain managers",ea:"High",usme:"Medium",adapt:"Minor",ctx:"Supply chain OSH framework directly relevant to rubber value chain; add Thai rubber sector specifics",lang:"English",dd:"Strong",dde:"Risk identification; Prevention; Mitigation; Monitoring",cls:"Adapt",rel:"Both",gaps:"Not FPRW-integrated beyond OSH; limited forced labour/child labour linkages; generic supply chain focus",ge:"Partial – gender considerations in supply chain OSH",inc:"Supply chain workers; Vulnerable groups in GVCs",csr:"Explicit",acc:"Open",lic:"Open",a11y:"Starter kit format; modular; practical tools and checklists",notes:"Vision Zero Fund resource. Supply chain OSH management tools. Directly relevant to rubber sector due diligence and supply chain compliance requirements."},

{id:"FPRW-028",title:"MNE Declaration: A Self-Assessment Tool for Enterprises",type:"Toolkit",year:2022,source:"ILO MULTI / IOE",link:"https://www.ilo.org/publications/self-assessment-tool-enterprises-based-tripartite-declaration-principles",fprw:"All FPRW",lr:"Social dialogue; Collective bargaining; Grievance handling",gi:"Strong",osh:"Strong",aud:"Employers; EBMOs; HR; Compliance; Management",ea:"High",usme:"Medium",adapt:"Minor",ctx:"Universal self-assessment; add Thai legal framework references; simplify for rubber SMEs",lang:"English",dd:"Strong",dde:"Risk identification; Prevention; Mitigation; Monitoring",cls:"Adapt",rel:"Both",gaps:"Comprehensive but lengthy; may need simplification for SMEs; not sector-specific",ge:"Equal pay; Non-discrimination; Gender equality in employment",inc:"Migrant workers; Workers with disabilities; Vulnerable groups",csr:"Explicit",acc:"Open",lic:"Open",a11y:"Self-assessment questionnaire; benchmarking format; structured by MNE Declaration themes",notes:"One of few tools integrating all five FPRW dimensions at enterprise level. Allows companies to benchmark against MNE Declaration guidance. Covers employment, training, conditions of work, industrial relations, and general policies."},

];

const fC={"FOA/CB":"#3b82f6","Forced Labour":"#ef4444","Child Labour":"#f59e0b","Non-discrimination":"#8b5cf6","OSH":"#10b981","All FPRW":"#6366f1"};
const cC={"Reuse":"#10b981","Adapt":"#3b82f6","Reference only":"#6b7280"};
const fields=[["FPRW Dimension(s)","fprw"],["Labour Relations Focus","lr"],["Gender & Inclusion Coverage","gi"],["OSH Coverage","osh"],["Target Audience","aud"],["Enterprise Applicability","ea"],["Usability for SMEs/Workers","usme"],["Adaptation Required","adapt"],["Contextualisation Needs","ctx"],["Language Availability","lang"],["Due Diligence Coverage","dd"],["DD Elements Covered","dde"],["Relevance to Activity","rel"],["Gender Equality Aspects","ge"],["Inclusion Aspects","inc"],["CSR/DD Alignment","csr"],["Access Conditions","acc"],["Licensing","lic"],["Accessibility","a11y"],["Identified Gaps","gaps"]];

let fprwFilter="All",clsFilter="All",selectedId=null;

function getBadgeColor(t){for(let k in fC)if(t.includes(k.substring(0,5)))return fC[k];return"#9ca3af";}

function render(){
const filtered=D.filter(r=>{
  const fm=fprwFilter==="All"||r.fprw.includes(fprwFilter);
  const cm=clsFilter==="All"||r.cls===clsFilter;
  return fm&&cm;
});
const s={t:D.length,r:D.filter(x=>x.cls==="Reuse").length,a:D.filter(x=>x.cls==="Adapt").length,rf:D.filter(x=>x.cls==="Reference only").length};
const fc={foa:D.filter(x=>x.fprw.includes("FOA")).length,fl:D.filter(x=>x.fprw.includes("Forced")).length,cl:D.filter(x=>x.fprw.includes("Child")).length,nd:D.filter(x=>x.fprw.includes("Non-disc")||x.fprw.includes("discrimin")).length,osh:D.filter(x=>x.fprw.includes("OSH")).length,all:D.filter(x=>x.fprw.includes("All FPRW")).length};

let h=`<h1>FPRW Stocktaking Inventory Matrix</h1>
<p class="subtitle">Completed & Validated | ${D.length} Resources Identified | April 2026
<button class="print-btn" onclick="window.print()">🖨 Print / Save PDF</button></p>
<div class="summary-row">
${[{l:"Total",v:s.t,c:"#1e3a5f"},{l:"Reuse",v:s.r,c:cC.Reuse},{l:"Adapt",v:s.a,c:cC.Adapt},{l:"Reference",v:s.rf,c:cC["Reference only"]}].map(x=>`<div class="summary-card" style="background:${x.c}"><div class="num">${x.v}</div><div class="lbl">${x.l}</div></div>`).join("")}
</div>
<div class="fprw-row">
${[{l:"FOA/CB",v:fc.foa,c:"#3b82f6"},{l:"Forced Labour",v:fc.fl,c:"#ef4444"},{l:"Child Labour",v:fc.cl,c:"#f59e0b"},{l:"Non-discrim.",v:fc.nd,c:"#8b5cf6"},{l:"OSH",v:fc.osh,c:"#10b981"},{l:"All FPRW",v:fc.all,c:"#6366f1"}].map(x=>`<div class="fprw-chip" style="border-color:${x.c}"><div class="num" style="color:${x.c}">${x.v}</div><div class="lbl">${x.l}</div></div>`).join("")}
</div>
<div class="filters">
<label>FPRW:</label>
<select onchange="fprwFilter=this.value;render()">
<option ${fprwFilter==="All"?"selected":""}>All</option>
<option value="FOA" ${fprwFilter==="FOA"?"selected":""}>FOA/CB</option>
<option value="Forced" ${fprwFilter==="Forced"?"selected":""}>Forced Labour</option>
<option value="Child" ${fprwFilter==="Child"?"selected":""}>Child Labour</option>
<option value="Non-disc" ${fprwFilter==="Non-disc"?"selected":""}>Non-discrimination</option>
<option value="OSH" ${fprwFilter==="OSH"?"selected":""}>OSH</option>
<option value="All FPRW" ${fprwFilter==="All FPRW"?"selected":""}>All FPRW (integrated)</option>
</select>
<label>Classification:</label>
<select onchange="clsFilter=this.value;render()">
<option ${clsFilter==="All"?"selected":""}>All</option>
<option ${clsFilter==="Reuse"?"selected":""}>Reuse</option>
<option ${clsFilter==="Adapt"?"selected":""}>Adapt</option>
<option ${clsFilter==="Reference only"?"selected":""}>Reference only</option>
</select>
<span class="count">${filtered.length} of ${D.length} shown</span>
</div>
<div class="tbl-wrap"><table><thead><tr>
<th>ID</th><th>Title</th><th>Type</th><th>Year</th><th>FPRW</th><th>Ent. App.</th><th>Classification</th>
</tr></thead><tbody>`;

filtered.forEach((r,i)=>{
  const badges=r.fprw.split(";").map(f=>{const t=f.trim();return`<span class="badge" style="background:${getBadgeColor(t)}">${t.length>18?t.substring(0,16)+"…":t}</span>`}).join("");
  h+=`<tr onclick="selectedId='${r.id}';render()" style="background:${i%2===0?"#fff":"#f9fafb"}">
  <td style="font-weight:600;color:#1e3a5f">${r.id}</td>
  <td style="max-width:280px">${r.title}</td>
  <td>${r.type}</td><td>${r.year}</td>
  <td>${badges}</td>
  <td>${r.ea}</td>
  <td><span class="cls-badge" style="background:${cC[r.cls]||"#999"}">${r.cls}</span></td>
  </tr>`;
});
h+=`</tbody></table></div>
<div class="meth-note"><strong>Methodology Note:</strong> This inventory follows the Methodological Reference Note for the FPRW Workplace Labour Relations Improvement Toolkit stocktaking. Resources identified through systematic search of ILO global thematic portals, ITCILO catalogues, ILO Helpdesk, ILO ACT/EMP publications, and related ILO/IOE materials. Each resource assessed for technical relevance, usability, contextual adaptability, and gender/inclusion depth. Click any row for the full assessment record.<br><br><strong>⚠ ITCILO Access Note:</strong> Resources hosted on ITCILO (FPRW-001, -014, -017, -021, -029) require free registration on <a href="https://ecampus.itcilo.org/" target="_blank" onclick="event.stopPropagation()">ITCILO eCampus</a> to access full training content.</div>`;

if(selectedId){
  const r=D.find(x=>x.id===selectedId);
  if(r){
    h+=`<div class="detail-overlay" onclick="if(event.target===this){selectedId=null;render()}">
    <div class="detail-card">
    <button class="close-btn" onclick="selectedId=null;render()">✕ Close</button>
    <div class="top-badges">
    <span class="badge" style="background:#1e3a5f;font-size:12px;padding:3px 10px">${r.id}</span>
    <span class="cls-badge" style="background:${cC[r.cls]}">${r.cls}</span>
    <span style="font-size:12px;color:#6b7280">${r.type} | ${r.year}</span>
    </div>
    <h2>${r.title}</h2>
    <p class="src">${r.source}</p>`;
    fields.forEach(([label,key])=>{
      h+=`<div class="detail-row"><span class="dl">${label}</span><span class="dv">${r[key]}</span></div>`;
    });
    h+=`<div class="reviewer-box"><strong>Reviewer Notes:</strong> ${r.notes}</div>`;
    if(r.link) h+=`<a class="link-out" href="#" onclick="event.preventDefault();event.stopPropagation();window.open('${r.link}','_blank')">View source →</a>`;
    h+=`</div></div>`;
  }
}
document.getElementById("app").innerHTML=h;
}
render();
</script>
</body>
</html>
